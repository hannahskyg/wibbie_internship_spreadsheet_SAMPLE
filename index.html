<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Spreadsheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>WIB Internship Spreadsheet</h1>
    <p>Browse the internship spreadsheet and filter it by industry, location, and date posted.</p>

    <section class="controls">
      <label>
        Search
        <input id="searchInput" type="text" placeholder="Company, role, pay, notes...">
      </label>

      <label>
        Industry
        <select id="industryFilter">
          <option value="">All industries</option>
        </select>
      </label>

      <label>
        Location
        <select id="locationFilter">
          <option value="">All locations</option>
        </select>
      </label>

      <label>
        Date posted after
        <input id="dateAfterFilter" type="date">
      </label>

      <label>
        Date posted before
        <input id="dateBeforeFilter" type="date">
      </label>

      <label>
        Sort date posted
        <select id="dateSort">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </label>
    </section>

    <p id="status" class="status">Loading internship_spreadsheet.csv...</p>

    <section class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Industry</th>
            <th>Location</th>
            <th>Date Posted</th>
            <th>Pay</th>
            <th>Apply</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
